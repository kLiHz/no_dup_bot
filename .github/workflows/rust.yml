name: Build Linux (x86_64 & aarch64)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu

    runs-on:  ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Tar artifacts
        id: tar-artifacts
        run: |
          ARTIFACT_DIR=target/${{ matrix.target }}/release/
          ARTIFACT_NAME=no_dup_bot
          TAR_FILE_NAME=no_dup_bot-${{ matrix.target }}.tar.zst
          tar --zstd -cf "${ARTIFACT_DIR}/${TAR_FILE_NAME}" -C "${ARTIFACT_DIR}" "${ARTIFACT_NAME}" 
          echo "ARTIFACT_DIR=${ARTIFACT_DIR}" >> "$GITHUB_OUTPUT"
          echo "TAR_FILE_NAME=${TAR_FILE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ${{ steps.tar-artifacts.outputs.ARTIFACT_DIR }}/${{ steps.tar-artifacts.outputs.TAR_FILE_NAME }}
          retention-days: 30
